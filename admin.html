<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Bistro | Admin Dashboard</title>
    <!-- Modern high-end thin font (Vogue style) -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Login Overlay Styling */
        #loginOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-ivory);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .login-box {
            background: white;
            padding: 3rem;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--secondary-stone);
        }
        .login-box h2 {
            font-family: var(--font-heading);
            margin-bottom: 2rem;
            letter-spacing: 0.1em;
        }
        .login-box input {
            width: 100%;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--secondary-stone);
            font-family: var(--font-body);
            text-align: center;
            letter-spacing: 0.2rem;
        }
    </style>
</head>
<body>
    <!-- Language Switcher -->
    <div class="lang-switcher" style="position: absolute; top: 1rem; right: 1.5rem; z-index: 2000;">
        <button id="adminLangEn" class="lang-btn active">EN</button>
        <span class="divider">|</span>
        <button id="adminLangIt" class="lang-btn">IT</button>
    </div>

    <!-- Login Section -->
    <div id="loginOverlay">
        <div class="login-box">
            <h2 class="i18n" data-en="AUTHENTICATION" data-it="AUTENTICAZIONE">AUTHENTICATION</h2>
            <input type="password" id="adminPassword" class="i18n-ph" data-en-ph="ACCESS KEY" data-it-ph="CHIAVE DI ACCESSO" placeholder="ACCESS KEY">
            <button type="button" id="loginBtn" class="btn i18n" data-en="LOGIN" data-it="ACCEDI">LOGIN</button>
            <p id="loginError" class="i18n" data-en="Invalid key" data-it="Chiave non valida" style="color: #c62828; margin-top: 1rem; font-size: 0.85rem; display: none;">Invalid key</p>
            <a href="index.html" class="admin-link i18n" data-en="Back to Site" data-it="Torna al Sito" style="display: block; margin-top: 1.5rem; font-size: 0.75rem;">Back to Site</a>
        </div>
    </div>

    <!-- Admin Content (hidden until login) -->
    <div class="admin-container" style="display: none;">
        <div class="admin-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem;">
            <h2 style="margin-bottom: 0;" class="i18n" data-en="ADMIN DASHBOARD" data-it="PANNELLO AMMINISTRATIVO">ADMIN DASHBOARD</h2>
            <div style="display: flex; gap: 1.5rem; align-items: center;">
                <a href="index.html" class="admin-link i18n" data-en="Back to Site" data-it="Torna al Sito" style="font-size: 0.85rem;">Back to Site</a>
                <button type="button" id="logoutBtn" class="btn i18n" data-en="Logout" data-it="Esci" style="padding: 0.4rem 1rem; font-size: 0.75rem; background: #c62828;">Logout</button>
            </div>
        </div>

        <div id="alertBox"></div>

        <form id="itemForm">
            <input type="hidden" id="itemId">
            
            <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                <div class="form-group lang-grp lang-en-grp" style="flex: 2;">
                    <label class="i18n" data-en="CATEGORY" data-it="CATEGORIA">CATEGORY</label>
                    <input type="text" id="itemCategoryEn" class="i18n-ph" data-en-ph="e.g. Starters" data-it-ph="es. Starters" placeholder="e.g. Starters">
                </div>
                <div class="form-group lang-grp lang-it-grp" style="flex: 2; display: none;">
                    <label class="i18n" data-en="CATEGORY" data-it="CATEGORIA">CATEGORY</label>
                    <input type="text" id="itemCategoryIt" class="i18n-ph" data-en-ph="e.g. Antipasti" data-it-ph="es. Antipasti" placeholder="es. Antipasti">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label class="i18n" data-en="PRICE" data-it="PREZZO">PRICE</label>
                    <input type="text" id="itemPrice" placeholder="€0.00">
                </div>
            </div>

            <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                <div class="form-group lang-grp lang-en-grp" style="flex: 1;">
                    <label class="i18n" data-en="NAME" data-it="NOME">NAME</label>
                    <input type="text" id="itemNameEn" class="i18n-ph" data-en-ph="Dish name in English" data-it-ph="Nome in inglese" placeholder="Dish name in English">
                </div>
                <div class="form-group lang-grp lang-it-grp" style="flex: 1; display: none;">
                    <label class="i18n" data-en="NAME" data-it="NOME">NAME</label>
                    <input type="text" id="itemNameIt" class="i18n-ph" data-en-ph="Dish name in Italian" data-it-ph="Nome in Italiano" placeholder="Nome in Italiano">
                </div>
            </div>

            <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                <div class="form-group lang-grp lang-en-grp" style="flex: 1;">
                    <label class="i18n" data-en="DESCRIPTION" data-it="DESCRIZIONE">DESCRIPTION</label>
                    <textarea id="itemDescEn" class="i18n-ph" data-en-ph="English description..." data-it-ph="Descrizione in inglese..." rows="2" placeholder="English description..."></textarea>
                </div>
                <div class="form-group lang-grp lang-it-grp" style="flex: 1; display: none;">
                    <label class="i18n" data-en="DESCRIPTION" data-it="DESCRIZIONE">DESCRIPTION</label>
                    <textarea id="itemDescIt" class="i18n-ph" data-en-ph="Italian description..." data-it-ph="Descrizione in Italiano..." rows="2" placeholder="Descrizione in Italiano..."></textarea>
                </div>
            </div>
            <button type="submit" class="btn i18n" data-en="Save" data-it="Salva">Save</button>
            <button type="button" id="cancelBtn" class="btn i18n" data-en="Cancel" data-it="Annulla" style="background-color: var(--secondary-stone); color: var(--text-graphite); display: none;">Cancel</button>
        </form>

        <table id="menuTable">
            <thead>
                <tr>
                    <th class="i18n" data-en="Categories" data-it="Categorie">Categories</th>
                    <th class="i18n" data-en="Name" data-it="Nome">Name</th>
                    <th class="i18n" data-en="Price" data-it="Prezzo">Price</th>
                    <th width="150" class="i18n" data-en="Actions" data-it="Azioni">Actions</th>
                </tr>
            </thead>
            <tbody id="menuTableBody">
                <tr><td colspan="4">Caricamento...</td></tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="admin.js"></script>
</body>
</html>
