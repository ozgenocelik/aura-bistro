<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Bistro | Admin Dashboard</title>
    <!-- Modern high-end thin font (Vogue style) -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Login Overlay Styling */
        #loginOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-ivory);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .login-box {
            background: white;
            padding: 3rem;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--secondary-stone);
        }
        .login-box h2 {
            font-family: var(--font-heading);
            margin-bottom: 2rem;
            letter-spacing: 0.1em;
        }
        .login-box input {
            width: 100%;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--secondary-stone);
            font-family: var(--font-body);
            text-align: center;
            letter-spacing: 0.2rem;
        }
    </style>
</head>
<body>
    <!-- Login Section -->
    <div id="loginOverlay">
        <div class="login-box">
            <h2>AUTENTICAZIONE<br><span style="font-size: 0.6em; opacity: 0.7;">AUTHENTICATION</span></h2>
            <input type="password" id="adminPassword" placeholder="CHIAVE DI ACCESSO / ACCESS KEY">
            <button type="button" id="loginBtn" class="btn">Accedi / Login</button>
            <p id="loginError" style="color: #c62828; margin-top: 1rem; font-size: 0.85rem; display: none;">Chiave non valida / Invalid key</p>
            <a href="index.html" class="admin-link" style="display: block; margin-top: 1.5rem; font-size: 0.75rem;">Torna al Sito / Back to Site</a>
        </div>
    </div>

    <!-- Admin Content (hidden until login) -->
    <div class="admin-container" style="display: none;">
        <div class="admin-header">
            <h2>PANNELLO AMMINISTRATIVO <span style="font-size:0.6em; opacity:0.7;">/ ADMIN DASHBOARD</span></h2>
            <a href="index.html" class="admin-link" style="font-size: 0.9rem;">Torna al Sito / Back to Site</a>
        </div>

        <div id="alertBox"></div>

        <form id="itemForm">
            <input type="hidden" id="itemId">
            
            <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                <div class="form-group" style="flex: 1;">
                    <label>CATEGORY (EN)</label>
                    <input type="text" id="itemCategoryEn" placeholder="e.g. Starters" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>CATEGORY (IT)</label>
                    <input type="text" id="itemCategoryIt" placeholder="es. Antipasti" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>PRICE</label>
                    <input type="text" id="itemPrice" placeholder="€0.00" required>
                </div>
            </div>

            <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                <div class="form-group" style="flex: 1;">
                    <label>NAME (EN)</label>
                    <input type="text" id="itemNameEn" placeholder="Dish name in English" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>NAME (IT)</label>
                    <input type="text" id="itemNameIt" placeholder="Nome in Italiano" required>
                </div>
            </div>

            <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                <div class="form-group" style="flex: 1;">
                    <label>DESCRIPTION (EN)</label>
                    <textarea id="itemDescEn" rows="2" placeholder="English description..."></textarea>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>DESCRIPTION (IT)</label>
                    <textarea id="itemDescIt" rows="2" placeholder="Descrizione in Italiano..."></textarea>
                </div>
            </div>
            <button type="submit" class="btn">Salva / Save</button>
            <button type="button" id="cancelBtn" class="btn" style="background-color: var(--secondary-stone); color: var(--text-graphite); display: none;">Annulla / Cancel</button>
        </form>

        <table id="menuTable">
            <thead>
                <tr>
                    <th>Categorie / Categories</th>
                    <th>Nomi / Names (EN / IT)</th>
                    <th>Prezzo / Price</th>
                    <th width="150">Azioni / Actions</th>
                </tr>
            </thead>
            <tbody id="menuTableBody">
                <tr><td colspan="4">Caricamento...</td></tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="admin.js"></script>
</body>
</html>
