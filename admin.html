<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Bistro | Admin Dashboard</title>
    <!-- Modern high-end thin font (Vogue style) -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            max-width: 800px;
            margin: 4rem auto;
            padding: 2rem;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--secondary-stone);
            padding-bottom: 1rem;
        }
        .btn {
            background-color: var(--text-graphite);
            color: var(--bg-ivory);
            border: none;
            padding: 0.5rem 1rem;
            font-family: var(--font-body);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover {
            background-color: var(--accent-gold);
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.3rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--secondary-stone);
            font-family: var(--font-body);
            background-color: var(--bg-ivory);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 2rem;
        }
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--secondary-stone);
            font-size: 0.9rem;
        }
        th {
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: rgba(26,26,26,0.6);
        }
        .actions {
            display: flex;
            gap: 0.5rem;
        }
        #alertBox {
            padding: 1rem;
            margin-bottom: 1rem;
            display: none;
            border-radius: 4px;
        }
        .alert-error {
            background: #ffebee;
            color: #c62828;
        }
        .alert-success {
            background: #e8f5e9;
            color: #2e7d32;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h2>Admin Dashboard</h2>
            <a href="index.html" class="admin-link" style="font-size: 0.9rem;">Back to Menu</a>
        </div>

        <div id="alertBox"></div>

        <form id="itemForm">
            <input type="hidden" id="itemId">
            <div style="display: flex; gap: 1rem;">
                <div class="form-group" style="flex: 1;">
                    <label>Category</label>
                    <input type="text" id="itemCategory" placeholder="e.g. Starters, Main Courses" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Name</label>
                    <input type="text" id="itemName" placeholder="Dish Name" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Price</label>
                    <input type="text" id="itemPrice" placeholder="€0.00" required>
                </div>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="itemDesc" rows="3" placeholder="Dish description..."></textarea>
            </div>
            <button type="submit" class="btn">Save Item</button>
            <button type="button" id="cancelBtn" class="btn" style="background-color: var(--secondary-stone); color: var(--text-graphite); display: none;">Cancel Edit</button>
        </form>

        <table id="menuTable">
            <thead>
                <tr>
                    <th>Category</th>
                    <th>Name</th>
                    <th>Price</th>
                    <th width="150">Actions</th>
                </tr>
            </thead>
            <tbody id="menuTableBody">
                <tr><td colspan="4">Loading...</td></tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="admin.js"></script>
</body>
</html>
